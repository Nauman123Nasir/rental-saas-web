<div class="auth-container">
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  
  <div class="glass-card">
    <div class="card-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h2>Forgot Password</h2>
      <p class="subtitle">Enter email to recover your account</p>
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div *ngIf="errorMessage()" class="alert-box error">
        <svg class="alert-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>

      <div *ngIf="successMessage()" class="alert-box success">
        <svg class="alert-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>{{ successMessage() }}</span>
      </div>

      <div class="input-group" [class.error]="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid" *ngIf="!successMessage()">
        <label for="email">Work Email</label>
        <div class="input-wrapper">
          <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
          </svg>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="e.g. admin@acmerental.com"
            autocomplete="email"
          />
        </div>
        <span *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.errors?.['required']" class="error-text">Email is required.</span>
        <span *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.errors?.['email']" class="error-text">Enter a valid email address.</span>
      </div>

      <button type="submit" [disabled]="isLoading()" class="btn-primary" *ngIf="!successMessage()">
        <span *ngIf="!isLoading()">Send Reset Link</span>
        <div *ngIf="isLoading()" class="spinner"></div>
      </button>

      <a routerLink="/auth/login" class="back-link">Back to Sign In</a>
    </form>
  </div>
</div>
