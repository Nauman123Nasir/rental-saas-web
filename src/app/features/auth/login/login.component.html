<div class="auth-container">
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  
  <div class="glass-card">
    <div class="card-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
          <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h21a1 1 0 0 0 1-1V11a2 2 0 0 0-2-2h-6"></path>
          <path d="M6 18V9h4v9H6z"></path>
        </svg>
      </div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Global Asset Rental Operations Platform</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div *ngIf="errorMessage()" class="alert-box error">
        <svg class="alert-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>

      <div class="input-group" [class.error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
        <label for="email">Work Email</label>
        <div class="input-wrapper">
          <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
          </svg>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="e.g. admin@acmerental.com"
            autocomplete="email"
          />
        </div>
        <span *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']" class="error-text">Email is required.</span>
        <span *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']" class="error-text">Enter a valid email address.</span>
      </div>

      <div class="input-group" [class.error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
        <div class="label-wrapper">
          <label for="password">Password</label>
          <a routerLink="/auth/forgot-password" class="forgot-link">Forgot?</a>
        </div>
        <div class="input-wrapper">
          <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
        <span *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']" class="error-text">Password is required.</span>
      </div>

      <button type="submit" [disabled]="isLoading()" class="btn-primary">
        <span *ngIf="!isLoading()">Sign In</span>
        <div *ngIf="isLoading()" class="spinner"></div>
      </button>
    </form>
  </div>
</div>
