<div class="auth-container">
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  
  <div class="glass-card">
    <div class="card-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
        </svg>
      </div>
      <h2>Reset Password</h2>
      <p class="subtitle">Set a strong password for your account</p>
    </div>

    <form *ngIf="resetForm" [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div *ngIf="errorMessage()" class="alert-box error">
        <svg class="alert-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>

      <div *ngIf="successMessage()" class="alert-box success">
        <svg class="alert-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>{{ successMessage() }} - Redirecting...</span>
      </div>

      <div class="input-group" [class.error]="resetForm.get('password')?.touched && resetForm.get('password')?.invalid" *ngIf="!successMessage() && !errorMessage()">
        <label for="password">New Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
        <span *ngIf="resetForm.get('password')?.touched && resetForm.get('password')?.errors?.['required']" class="error-text">Password is required.</span>
        <span *ngIf="resetForm.get('password')?.touched && resetForm.get('password')?.errors?.['minlength']" class="error-text">Password must be at least 8 characters.</span>
      </div>

      <div class="input-group" [class.error]="resetForm.get('password_confirmation')?.touched && (resetForm.get('password_confirmation')?.invalid || resetForm.errors?.['mismatch'])" *ngIf="!successMessage() && !errorMessage()">
        <label for="password_confirmation">Confirm Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          <input 
            type="password" 
            id="password_confirmation" 
            formControlName="password_confirmation" 
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
        <span *ngIf="resetForm.get('password_confirmation')?.touched && resetForm.get('password_confirmation')?.errors?.['required']" class="error-text">Please confirm your password.</span>
        <span *ngIf="resetForm.get('password_confirmation')?.touched && resetForm.errors?.['mismatch']" class="error-text">Passwords do not match.</span>
      </div>

      <button type="submit" [disabled]="isLoading() || errorMessage()" class="btn-primary" *ngIf="!successMessage() && !errorMessage()">
        <span *ngIf="!isLoading()">Reset Password</span>
        <div *ngIf="isLoading()" class="spinner"></div>
      </button>

      <a routerLink="/auth/login" class="back-link">Back to Sign In</a>
    </form>
  </div>
</div>
