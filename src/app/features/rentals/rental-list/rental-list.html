<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 p-8 font-sans">
  <div class="max-w-6xl mx-auto">
    <!-- Header Section -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h2 class="text-4xl font-extrabold text-gray-800 tracking-tight">Active Rentals</h2>
        <p class="text-sm text-gray-500 mt-2">Manage ongoing and upcoming rental operations.</p>
      </div>
      <a routerLink="checkout" class="group relative px-6 py-3 font-semibold text-white transition-all duration-300 ease-in-out bg-indigo-600 rounded-xl hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-500/30 overflow-hidden">
        <span class="relative z-10 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
          New Checkout
        </span>
      </a>
    </div>

    <!-- Data Grid -->
    <div class="bg-white/70 backdrop-blur-xl border border-white/40 shadow-2xl rounded-3xl overflow-hidden transition-all duration-300">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-50/50 border-b border-gray-100">
            <th class="py-5 px-6 text-xs font-bold text-gray-400 uppercase tracking-wider">Rental ID</th>
            <th class="py-5 px-6 text-xs font-bold text-gray-400 uppercase tracking-wider">Status</th>
            <th class="py-5 px-6 text-xs font-bold text-gray-400 uppercase tracking-wider">Expected Return</th>
            <th class="py-5 px-6 text-xs font-bold text-gray-400 uppercase tracking-wider text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr *ngFor="let r of rentals" class="group hover:bg-indigo-50/30 transition-colors duration-200">
            <td class="py-4 px-6">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
                <div>
                  <p class="font-semibold text-gray-800">{{ r.rental_no }}</p>
                </div>
              </div>
            </td>
            <td class="py-4 px-6">
              <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold"
                    [ngClass]="{
                      'bg-emerald-100 text-emerald-700': r.status === 'Active',
                      'bg-amber-100 text-amber-700': r.status === 'Pending Pickup',
                      'bg-blue-100 text-blue-700': r.status === 'Returned',
                      'bg-gray-100 text-gray-700': !['Active','Pending Pickup','Returned'].includes(r.status || '')
                    }">
                {{ r.status }}
              </span>
            </td>
            <td class="py-4 px-6">
              <p class="text-sm text-gray-600 font-medium">{{ r.expected_return_datetime_utc | date:'medium' }}</p>
            </td>
            <td class="py-4 px-6 text-right">
              <a [routerLink]="[r.id, 'checkin']" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-indigo-600 bg-indigo-50 rounded-lg hover:bg-indigo-100 transition-colors">
                Check-in
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
              </a>
            </td>
          </tr>
          <tr *ngIf="rentals.length === 0">
            <td colspan="4" class="py-12 text-center text-gray-400">
              <div class="flex flex-col items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" /></svg>
                <p class="text-lg font-medium">No active rentals found</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
