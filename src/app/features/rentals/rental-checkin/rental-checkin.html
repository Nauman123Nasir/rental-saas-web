<div class="min-h-screen bg-gradient-to-br from-emerald-50 via-white to-teal-50 py-12 px-4 sm:px-6 lg:px-8 font-sans">
  <div class="max-w-3xl mx-auto">
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/60 overflow-hidden">
      
      <!-- Header -->
      <div class="px-8 py-6 border-b border-gray-100 bg-white/50">
        <div class="flex items-center gap-4">
          <div class="p-3 bg-emerald-100 rounded-2xl text-emerald-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          </div>
          <div>
            <h3 class="text-2xl font-extrabold text-gray-900 tracking-tight">Rental Check-in (Return)</h3>
            <p class="text-sm text-gray-500 mt-1">Log the returning asset and complete the return inspection.</p>
          </div>
        </div>
      </div>

      <!-- Form Area -->
      <div class="p-8">
        <div class="space-y-6">

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Fuel Level -->
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Return Fuel Level (%)</label>
              <input type="number" placeholder="80" 
                     class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 focus:bg-white transition-all duration-200 outline-none text-gray-800">
            </div>

            <!-- Odometer -->
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Return Odometer (km)</label>
              <input type="number" placeholder="12850" 
                     class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 focus:bg-white transition-all duration-200 outline-none text-gray-800">
            </div>
          </div>

          <!-- Notes -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Return Inspection Notes & Damages</label>
            <textarea rows="4" placeholder="Report any new damages or issues found..." 
                      class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-emerald-500/20 focus:border-emerald-500 focus:bg-white transition-all duration-200 outline-none text-gray-800 resize-none"></textarea>
          </div>

        </div>

        <!-- Action Buttons -->
        <div class="mt-8 flex items-center justify-end gap-4 pt-6 border-t border-gray-100">
          <button class="px-6 py-2.5 text-sm font-semibold text-gray-600 hover:text-gray-900 transition-colors">
            Cancel
          </button>
          <button class="px-8 py-3 text-sm font-bold text-white bg-emerald-600 rounded-xl shadow-lg shadow-emerald-600/30 hover:bg-emerald-700 hover:shadow-emerald-600/50 hover:-translate-y-0.5 transition-all duration-200">
            Confirm Return
          </button>
        </div>
        
      </div>
    </div>
  </div>
</div>
