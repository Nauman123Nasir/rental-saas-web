<div class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-blue-50 py-12 px-4 sm:px-6 lg:px-8 font-sans">
  <div class="max-w-3xl mx-auto">
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/60 overflow-hidden">
      
      <!-- Header -->
      <div class="px-8 py-6 border-b border-gray-100 bg-white/50">
        <div class="flex items-center gap-4">
          <div class="p-3 bg-indigo-100 rounded-2xl text-indigo-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" /></svg>
          </div>
          <div>
            <h3 class="text-2xl font-extrabold text-gray-900 tracking-tight">Rental Checkout (Pickup)</h3>
            <p class="text-sm text-gray-500 mt-1">Convert a reservation into an active rental by completing the pickup inspection.</p>
          </div>
        </div>
      </div>

      <!-- Form Area -->
      <div class="p-8">
        <div class="space-y-6">
          
          <!-- Reservation Selection -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Reservation ID</label>
            <div class="relative">
              <input type="text" placeholder="e.g. RES-12345" 
                     class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all duration-200 outline-none text-gray-800">
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Fuel Level -->
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Fuel Level (%)</label>
              <input type="number" placeholder="100" 
                     class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all duration-200 outline-none text-gray-800">
            </div>

            <!-- Odometer -->
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Odometer Reading (km)</label>
              <input type="number" placeholder="12500" 
                     class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all duration-200 outline-none text-gray-800">
            </div>
          </div>

          <!-- Notes -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Pickup Inspection Notes</label>
            <textarea rows="4" placeholder="Note any pre-existing minor scratches..." 
                      class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all duration-200 outline-none text-gray-800 resize-none"></textarea>
          </div>

        </div>

        <!-- Action Buttons -->
        <div class="mt-8 flex items-center justify-end gap-4 pt-6 border-t border-gray-100">
          <button class="px-6 py-2.5 text-sm font-semibold text-gray-600 hover:text-gray-900 transition-colors">
            Cancel
          </button>
          <button class="px-8 py-3 text-sm font-bold text-white bg-indigo-600 rounded-xl shadow-lg shadow-indigo-600/30 hover:bg-indigo-700 hover:shadow-indigo-600/50 hover:-translate-y-0.5 transition-all duration-200">
            Complete Checkout
          </button>
        </div>
        
      </div>
    </div>
  </div>
</div>
