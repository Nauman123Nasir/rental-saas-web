<div class="page-container">
  <div class="form-page-wrapper">

    <!-- Back link -->
    <a routerLink="/rentals" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      Back to Rentals
    </a>

    <div class="glass-card form-card-body">

      <!-- Card Header -->
      <div class="form-card-header">
        <div class="form-header-icon checkout-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
          </svg>
        </div>
        <div>
          <h1 class="form-card-title">Rental Checkout (Pickup)</h1>
          <p class="form-card-subtitle">Convert a confirmed reservation into an active rental by completing the pickup inspection.</p>
        </div>
      </div>

      <!-- Alerts -->
      <div *ngIf="error()" class="alert alert-error">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        {{ error() }}
      </div>

      <div *ngIf="success()" class="alert alert-success">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
        Checkout completed! Rental is now active. Redirecting...
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <div class="form-group" style="margin-bottom:1.25rem">
          <label class="form-label">Reservation ID *</label>
          <input type="number" formControlName="reservation_id" class="form-input" placeholder="e.g. 42">
          <span *ngIf="form.get('reservation_id')?.invalid && form.get('reservation_id')?.touched" class="form-error">
            Reservation ID is required
          </span>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Pickup Fuel Level (%)</label>
            <input type="number" formControlName="fuel_level" class="form-input" placeholder="100" min="0" max="100">
            <span *ngIf="form.get('fuel_level')?.invalid && form.get('fuel_level')?.touched" class="form-error">
              Enter a valid fuel level (0–100)
            </span>
          </div>

          <div class="form-group">
            <label class="form-label">Odometer Reading (km)</label>
            <input type="number" formControlName="odometer_reading" class="form-input" placeholder="12500">
            <span *ngIf="form.get('odometer_reading')?.invalid && form.get('odometer_reading')?.touched" class="form-error">
              Odometer reading is required
            </span>
          </div>
        </div>

        <div class="form-group" style="margin-top:1.25rem">
          <label class="form-label">Pickup Inspection Notes</label>
          <textarea formControlName="notes" class="form-textarea" rows="4" placeholder="Note any pre-existing scratches, damages, or special conditions..."></textarea>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" (click)="cancel()" [disabled]="submitting()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="submitting()">
            <svg *ngIf="submitting()" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="animation:spin 0.8s linear infinite">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            {{ submitting() ? 'Processing...' : 'Complete Checkout' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
