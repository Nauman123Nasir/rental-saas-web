<div class="max-w-4xl mx-auto pb-10">
  <div class="flex items-center mb-6">
    <a routerLink="/assets" class="text-gray-400 hover:text-white mr-4">
      <i class="fas fa-arrow-left"></i>
    </a>
    <h1 class="text-2xl font-semibold text-white">{{ isEditMode() ? 'Edit Asset' : 'Add New Asset' }}</h1>
  </div>

  <div *ngIf="loading()" class="text-center py-8 glass-panel">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white mx-auto"></div>
  </div>

  <form *ngIf="!loading()" [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <div class="glass-panel p-6">
      <h2 class="text-lg font-medium text-white mb-4 border-b border-white/10 pb-2">Basic Information</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="form-label">Asset Code *</label>
          <input type="text" formControlName="asset_code" class="form-input w-full" placeholder="e.g. AST-1001">
          <div *ngIf="form.get('asset_code')?.invalid && form.get('asset_code')?.touched" class="text-red-400 text-xs mt-1">Required</div>
        </div>

        <div>
          <label class="form-label">Category</label>
          <select formControlName="category_id" class="form-input w-full">
            <option [ngValue]="null">Select Category</option>
            <option *ngFor="let cat of categories()" [value]="cat.id">{{ cat.name }}</option>
          </select>
        </div>

        <div>
          <label class="form-label">Status *</label>
          <select formControlName="status" class="form-input w-full">
            <option value="Available">Available</option>
            <option value="Reserved">Reserved</option>
            <option value="Rented">Rented</option>
            <option value="Maintenance">Maintenance</option>
            <option value="Inactive">Inactive</option>
            <option value="Retired">Retired</option>
          </select>
        </div>
        
        <div>
          <label class="form-label">Ownership Type</label>
          <input type="text" formControlName="ownership_type" class="form-input w-full" placeholder="e.g. Owned, Leased">
        </div>
      </div>
    </div>

    <div class="glass-panel p-6">
      <h2 class="text-lg font-medium text-white mb-4 border-b border-white/10 pb-2">Specifications</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="form-label">Brand</label>
          <input type="text" formControlName="brand" class="form-input w-full">
        </div>
        <div>
          <label class="form-label">Model</label>
          <input type="text" formControlName="model" class="form-input w-full">
        </div>
        <div>
          <label class="form-label">Year</label>
          <input type="number" formControlName="year" class="form-input w-full">
        </div>

        <div>
          <label class="form-label">VIN Number</label>
          <input type="text" formControlName="vin_number" class="form-input w-full">
        </div>
        <div>
          <label class="form-label">Serial Number</label>
          <input type="text" formControlName="serial_number" class="form-input w-full">
        </div>
        
        <div>
          <label class="form-label">Fuel Type</label>
          <input type="text" formControlName="fuel_type" class="form-input w-full">
        </div>
        <div>
          <label class="form-label">Transmission</label>
          <input type="text" formControlName="transmission" class="form-input w-full">
        </div>
        
        <div>
          <label class="form-label">Current Mileage</label>
          <input type="number" formControlName="current_mileage" class="form-input w-full">
        </div>
        <div>
          <label class="form-label">Current Hours</label>
          <input type="number" step="0.01" formControlName="current_hours" class="form-input w-full">
        </div>
      </div>
    </div>

    <div class="glass-panel p-6">
      <h2 class="text-lg font-medium text-white mb-4 border-b border-white/10 pb-2">Rental Rates</h2>
      
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div>
          <label class="form-label">Hourly Rate</label>
          <div class="relative">
            <span class="absolute left-3 top-2 text-gray-400">$</span>
            <input type="number" step="0.01" formControlName="hourly_rate" class="form-input pl-8 w-full">
          </div>
        </div>
        <div>
          <label class="form-label">Daily Rate</label>
          <div class="relative">
            <span class="absolute left-3 top-2 text-gray-400">$</span>
            <input type="number" step="0.01" formControlName="daily_rate" class="form-input pl-8 w-full">
          </div>
        </div>
        <div>
          <label class="form-label">Weekly Rate</label>
          <div class="relative">
            <span class="absolute left-3 top-2 text-gray-400">$</span>
            <input type="number" step="0.01" formControlName="weekly_rate" class="form-input pl-8 w-full">
          </div>
        </div>
        <div>
          <label class="form-label">Monthly Rate</label>
          <div class="relative">
            <span class="absolute left-3 top-2 text-gray-400">$</span>
            <input type="number" step="0.01" formControlName="monthly_rate" class="form-input pl-8 w-full">
          </div>
        </div>
      </div>
    </div>

    <div class="glass-panel p-6">
      <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
        <h2 class="text-lg font-medium text-white">Maintenance Logs (Blocks)</h2>
        <button type="button" (click)="addMaintenanceBlock()" class="btn-secondary text-sm">
          <i class="fas fa-plus mr-1"></i> Add Log
        </button>
      </div>

      <div formArrayName="maintenance_blocks">
        <div *ngIf="maintenanceBlocks.length === 0" class="text-gray-400 text-sm italic">
          No maintenance logs recorded.
        </div>
        
        <div *ngFor="let block of maintenanceBlocks.controls; let i=index" [formGroupName]="i" class="bg-white/5 p-4 rounded-lg mb-4 relative group">
          <button type="button" (click)="removeMaintenanceBlock(i)" class="absolute top-2 right-2 text-gray-500 hover:text-red-400 transition-colors">
            <i class="fas fa-times"></i>
          </button>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="form-label text-xs">Start Date & Time</label>
              <input type="datetime-local" formControlName="start_datetime" class="form-input w-full text-sm">
            </div>
            <div>
              <label class="form-label text-xs">End Date & Time</label>
              <input type="datetime-local" formControlName="end_datetime" class="form-input w-full text-sm">
            </div>
            <div class="md:col-span-2">
              <label class="form-label text-xs">Reason / Description</label>
              <input type="text" formControlName="reason" class="form-input w-full text-sm">
            </div>
            <div>
              <label class="form-label text-xs">Cost</label>
              <div class="relative">
                <span class="absolute left-3 top-2 text-gray-400 text-sm">$</span>
                <input type="number" step="0.01" formControlName="cost" class="form-input pl-8 w-full text-sm">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3">
      <a routerLink="/assets" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-primary" [disabled]="saving()">
        <span *ngIf="saving()"><i class="fas fa-spinner fa-spin mr-2"></i>Saving...</span>
        <span *ngIf="!saving()">Save Asset</span>
      </button>
    </div>
  </form>
</div>
