<div class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50 py-12 px-4 sm:px-6 lg:px-8 font-sans">
  <div class="max-w-4xl mx-auto">
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-xl border border-white/60 overflow-hidden">
      
      <div class="px-8 py-6 border-b border-gray-100 bg-white/50">
        <h3 class="text-2xl font-extrabold text-gray-900 tracking-tight">Create New Reservation</h3>
        <p class="text-sm text-gray-500 mt-1">Book an asset for a customer and set up pricing.</p>
      </div>

      <div class="p-8">
        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Customer ID</label>
              <input type="number" placeholder="1" class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white outline-none">
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Asset ID</label>
              <input type="number" placeholder="1" class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white outline-none">
            </div>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Pickup Date & Time</label>
              <input type="datetime-local" class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white outline-none">
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Return Date & Time</label>
              <input type="datetime-local" class="w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white outline-none">
            </div>
          </div>
        </div>

        <div class="mt-8 flex justify-end gap-4">
          <button class="px-6 py-2.5 text-sm font-semibold text-gray-600 hover:text-gray-900 transition-colors">Cancel</button>
          <button class="px-8 py-3 text-sm font-bold text-white bg-indigo-600 rounded-xl shadow-lg shadow-indigo-600/30 hover:bg-indigo-700">Save Booking</button>
        </div>
      </div>
    </div>
  </div>
</div>
