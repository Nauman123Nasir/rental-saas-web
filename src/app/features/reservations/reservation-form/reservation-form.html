<div class="page-container">
  <div class="form-page-wrapper">

    <!-- Back link -->
    <a routerLink="/reservations" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      Back to Reservations
    </a>

    <div class="glass-card res-form-card">

      <!-- Header -->
      <div class="res-form-header">
        <div class="res-form-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </div>
        <div>
          <h1 class="res-form-title">New Reservation</h1>
          <p class="res-form-subtitle">Book an asset for a customer and set up the rental schedule.</p>
        </div>
      </div>

      <!-- Alerts -->
      <div *ngIf="error()" class="alert alert-error" style="margin: 1.5rem 2rem 0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        {{ error() }}
      </div>

      <div *ngIf="success()" class="alert alert-success" style="margin: 1.5rem 2rem 0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
        Reservation created successfully! Redirecting...
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <!-- Customer & Asset -->
        <div class="res-form-section">
          <h2 class="res-section-title">Customer &amp; Asset</h2>
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Customer *</label>
              <select formControlName="customer_id" class="form-select">
                <option [value]="null">Select a Customer...</option>
                <option *ngFor="let c of customers()" [value]="c.id">
                  {{ c.first_name }} {{ c.last_name }} ({{ c.email }})
                </option>
              </select>
              <span *ngIf="form.get('customer_id')?.invalid && form.get('customer_id')?.touched" class="form-error">
                Customer is required
              </span>
            </div>
            <div class="form-group">
              <label class="form-label">Asset *</label>
              <select formControlName="asset_id" class="form-select">
                <option [value]="null">Select an Asset...</option>
                <option *ngFor="let a of assets()" [value]="a.id">
                  {{ a.brand }} {{ a.model }} ({{ a.license_plate }} — {{ a.status }})
                </option>
              </select>
              <span *ngIf="form.get('asset_id')?.invalid && form.get('asset_id')?.touched" class="form-error">
                Asset selection is required
              </span>
            </div>
          </div>
        </div>

        <!-- Schedule -->
        <div class="res-form-section">
          <h2 class="res-section-title">Schedule</h2>
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Pickup Date &amp; Time *</label>
              <input type="datetime-local" formControlName="pickup_datetime_utc" class="form-input">
              <span *ngIf="form.get('pickup_datetime_utc')?.invalid && form.get('pickup_datetime_utc')?.touched" class="form-error">
                Pickup date is required
              </span>
            </div>
            <div class="form-group">
              <label class="form-label">Return Date &amp; Time *</label>
              <input type="datetime-local" formControlName="return_datetime_utc" class="form-input">
              <span *ngIf="form.get('return_datetime_utc')?.invalid && form.get('return_datetime_utc')?.touched" class="form-error">
                Return date is required
              </span>
            </div>
          </div>
        </div>

        <!-- Notes -->
        <div class="res-form-section">
          <div class="form-group">
            <label class="form-label">Notes (optional)</label>
            <textarea formControlName="notes" class="form-textarea" rows="3" placeholder="Any special instructions or notes..."></textarea>
          </div>
        </div>

        <!-- Actions -->
        <div class="res-form-actions">
          <button type="button" class="btn btn-ghost" (click)="cancel()" [disabled]="submitting()">Cancel</button>
          <button type="submit" class="btn btn-primary" [disabled]="submitting()">
            <svg *ngIf="submitting()" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="animation:spin 0.8s linear infinite">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            {{ submitting() ? 'Saving...' : 'Save Booking' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
